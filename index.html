<!DOCTYPE html>
<html>
<head>
  <title>3D Movement Game</title>
  <style>body { margin: 0; }</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.y = 2;
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Player
const geometry = new THREE.BoxGeometry();
const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
const player = new THREE.Mesh(geometry, material);
scene.add(player);

// Floor
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshBasicMaterial({ color: 0x555555, side: THREE.DoubleSide });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = Math.PI / 2;
scene.add(floor);

// Controls
document.addEventListener("keydown", e => {
  if (e.key === "w") player.position.z -= 0.5;
  if (e.key === "s") player.position.z += 0.5;
  if (e.key === "a") player.position.x -= 0.5;
  if (e.key === "d") player.position.x += 0.5;
});

function animate() {
  requestAnimationFrame(animate);
  camera.lookAt(player.position);
  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
